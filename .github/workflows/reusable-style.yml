name: Style
on:
  workflow_call:

jobs:
  style:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Format check
        run: pnpm run format:check
